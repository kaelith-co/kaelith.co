<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery — Kaelith</title>
  <meta name="description" content="Kaelith visual gallery — landscape, portrait, food and animal photography." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* ── TOKENS (mirrors main site exactly) ─────────────── */
    :root {
      --cream:        #F7F3EE;
      --cream-dark:   #EDE7DE;
      --gold:         #C9A96E;
      --gold-light:   #DEC48A;
      --gold-dim:     #A88850;
      --brown:        #6B4F35;
      --ink:          #1A1614;
      --ink-soft:     #2E2520;
      --mist:         #D8D0C8;
      --white:        #FFFFFF;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body:    'Outfit', sans-serif;
      --ease-silk:    cubic-bezier(0.16, 1, 0.3, 1);
      --max-w:        1400px;
      --gutter:       clamp(1.5rem, 5vw, 4rem);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 16px; }
    body {
      background: var(--cream);
      color: var(--ink);
      font-family: var(--font-body);
      font-weight: 300;
      line-height: 1.7;
      overflow-x: hidden;
      cursor: none;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }
    ul { list-style: none; }
    img { display: block; max-width: 100%; }

    /* ── GRAIN ────────────────────────────────────────────── */
    .grain {
      position: fixed;
      inset: -50%; width: 200%; height: 200%;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.030;
      mix-blend-mode: multiply;
    }

    /* ── CURSOR ───────────────────────────────────────────── */
    .cursor-dot, .cursor-ring {
      position: fixed; top: 0; left: 0;
      pointer-events: none; z-index: 10000;
      transform: translate(-50%, -50%);
      transition-timing-function: var(--ease-silk);
      transition-property: transform, opacity;
    }
    .cursor-dot  { width: 6px; height: 6px; background: var(--gold); border-radius: 50%; transition-duration: 0.05s; }
    .cursor-ring { width: 36px; height: 36px; border: 1px solid var(--gold); border-radius: 50%; opacity: 0.55; transition-duration: 0.18s; }
    body.cursor-hover .cursor-ring { transform: translate(-50%,-50%) scale(1.7); opacity: 0.85; }

    /* ── NAV ──────────────────────────────────────────────── */
    .nav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.6rem var(--gutter);
      background: rgba(247,243,238,0.90);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(201,169,110,0.18);
    }
    .nav__logo { font-family: var(--font-display); font-size: 1.4rem; color: var(--gold-dim); letter-spacing: 0.06em; }
    .nav__links { display: flex; gap: clamp(1.2rem, 3vw, 2.8rem); }
    .nav__links a {
      font-size: 0.7rem; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--ink-soft); transition: color 0.3s; position: relative;
    }
    .nav__links a::after {
      content: ''; position: absolute; bottom: -3px; left: 0;
      width: 0; height: 1px; background: var(--gold);
      transition: width 0.35s var(--ease-silk);
    }
    .nav__links a:hover { color: var(--gold-dim); }
    .nav__links a:hover::after, .nav__links a.active::after { width: 100%; }
    .nav__links a.active { color: var(--gold-dim); }

    /* ── PAGE ─────────────────────────────────────────────── */
    .page { padding-top: 96px; }

    /* ── HERO ─────────────────────────────────────────────── */
    .ghero {
      padding: clamp(3rem, 6vw, 5rem) var(--gutter) clamp(1.5rem, 3vw, 2.5rem);
      max-width: var(--max-w);
      margin: 0 auto;
    }
    .ghero__label {
      display: block;
      font-size: 0.65rem; letter-spacing: 0.30em; text-transform: uppercase;
      color: var(--gold-dim); margin-bottom: 1rem;
    }
    .ghero__title {
      font-family: var(--font-display); font-weight: 300;
      font-size: clamp(3rem, 8vw, 5.5rem); line-height: 1.06; color: var(--ink);
    }
    .ghero__title em { font-style: italic; color: var(--gold); }

    /* ── HR ───────────────────────────────────────────────── */
    .hr-wrap { max-width: var(--max-w); margin: 0 auto; padding: 0 var(--gutter); }
    .hr-wrap hr { border: none; height: 1px; background: linear-gradient(to right, transparent, var(--gold), transparent); opacity: 0.35; }

    /* ── FILTER BAR ───────────────────────────────────────── */
    .filters {
      max-width: var(--max-w);
      margin: clamp(2rem, 4vw, 3rem) auto 0;
      padding: 0 var(--gutter);
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
    }
    .filter-btn {
      padding: 0.55rem 1.6rem;
      font-family: var(--font-body);
      font-size: 0.68rem;
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--brown);
      background: transparent;
      border: 1px solid var(--mist);
      cursor: none;
      transition: background 0.35s, color 0.35s, border-color 0.35s, transform 0.35s var(--ease-silk);
    }
    .filter-btn:hover {
      border-color: var(--gold);
      color: var(--gold-dim);
      transform: translateY(-2px);
    }
    .filter-btn.active {
      background: var(--ink);
      color: var(--gold-light);
      border-color: var(--ink);
    }

    /* ── COUNT LABEL ──────────────────────────────────────── */
    .gallery-count {
      max-width: var(--max-w);
      margin: 1.4rem auto 0;
      padding: 0 var(--gutter);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold-dim);
    }

    /* ── MASONRY GRID ─────────────────────────────────────── */
    /* columns() automatically reflows — no fixed count needed */
    .gallery-grid {
      max-width: var(--max-w);
      margin: clamp(1.5rem, 3vw, 2.5rem) auto 0;
      padding: 0 var(--gutter) clamp(4rem, 8vw, 8rem);
      columns: 3 280px;   /* auto-fills columns, min 280px each */
      column-gap: 14px;
    }

    /* ── GALLERY ITEM ─────────────────────────────────────── */
    .gitem {
      break-inside: avoid;
      margin-bottom: 14px;
      position: relative;
      overflow: hidden;
      cursor: none;
      /* default state */
      transition: opacity 0.55s var(--ease-silk), filter 0.55s var(--ease-silk), transform 0.55s var(--ease-silk);
    }

    /* dimmed state — non-matching category */
    .gitem.dimmed {
      opacity: 0.45;
      filter: grayscale(1);
    }
    /* active (matching) state */
    .gitem.active-item {
      opacity: 1;
      filter: none;
    }

    .gitem img {
      width: 100%;
      display: block;
      transition: transform 0.75s var(--ease-silk), filter 0.75s var(--ease-silk);
      filter: brightness(0.93) saturate(0.92);
    }
    .gitem:hover img {
      transform: scale(1.04);
      filter: brightness(0.82) saturate(1.05);
    }

    /* caption overlay */
    .gitem__overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(20,14,10,0.7) 0%, transparent 55%);
      opacity: 0;
      transition: opacity 0.45s var(--ease-silk);
      display: flex; align-items: flex-end;
      padding: 1.2rem;
      pointer-events: none;
    }
    .gitem:hover .gitem__overlay { opacity: 1; }
    .gitem__cat {
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold-light);
      transform: translateY(6px);
      transition: transform 0.45s var(--ease-silk) 0.05s;
    }
    .gitem:hover .gitem__cat { transform: translateY(0); }

    /* entrance animation */
    .gitem {
      opacity: 0;
      transform: translateY(18px);
    }
    .gitem.in {
      opacity: 1;
      transform: translateY(0);
      transition: opacity 0.6s var(--ease-silk), transform 0.6s var(--ease-silk),
                  filter 0.55s var(--ease-silk);
    }
    /* when dimmed AND entered */
    .gitem.in.dimmed {
      opacity: 0.45;
    }

    /* ── LIGHTBOX ─────────────────────────────────────────── */
    .lightbox {
      position: fixed; inset: 0;
      z-index: 5000;
      background: rgba(20,14,10,0.96);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.4s var(--ease-silk);
    }
    .lightbox.open { opacity: 1; pointer-events: all; }
    .lightbox__img {
      max-width: 90vw; max-height: 88vh;
      object-fit: contain;
      transform: scale(0.96);
      transition: transform 0.45s var(--ease-silk);
    }
    .lightbox.open .lightbox__img { transform: scale(1); }
    .lightbox__close {
      position: absolute; top: 2rem; right: 2.5rem;
      font-size: 1.8rem; color: var(--gold);
      background: none; border: none; cursor: none;
      transition: transform 0.3s, color 0.3s;
      line-height: 1;
    }
    .lightbox__close:hover { transform: rotate(90deg); color: var(--gold-light); }
    .lightbox__prev,
    .lightbox__next {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: none; border: none;
      color: var(--gold); font-size: 2rem;
      cursor: none; padding: 1rem;
      transition: color 0.3s, transform 0.3s var(--ease-silk);
    }
    .lightbox__prev { left: 1.5rem; }
    .lightbox__next { right: 1.5rem; }
    .lightbox__prev:hover { color: var(--gold-light); transform: translateY(-50%) translateX(-4px); }
    .lightbox__next:hover { color: var(--gold-light); transform: translateY(-50%) translateX(4px); }
    .lightbox__caption {
      position: absolute; bottom: 2rem; left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase;
      color: rgba(201,169,110,0.6);
    }

    /* ── FOOTER ───────────────────────────────────────────── */
    .footer {
      padding: 2rem var(--gutter);
      background: var(--ink-soft); text-align: center;
      font-size: 0.68rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: rgba(201,169,110,0.35);
    }
    .footer a { color: rgba(201,169,110,0.5); transition: color 0.3s; }
    .footer a:hover { color: var(--gold); }

    /* ── FLOATING QUERY BTN (same as main site) ───────────── */
    .float-query {
      position: fixed; bottom: 2.5rem; right: 2.5rem;
      z-index: 500;
      display: flex; align-items: center; gap: 0.6rem;
      padding: 1rem 1.8rem;
      background: var(--ink); border: 1px solid rgba(201,169,110,0.35);
      color: var(--gold-light);
      font-family: var(--font-body); font-size: 0.78rem; font-weight: 300;
      letter-spacing: 0.2em; text-transform: uppercase; text-decoration: none;
      opacity: 1;
      transition: background 0.38s, color 0.38s, border-color 0.38s,
                  transform 0.38s var(--ease-silk), box-shadow 0.38s;
    }
    .float-query:hover {
      background: var(--gold); color: var(--ink); border-color: var(--gold);
      transform: translateY(-4px); box-shadow: 0 16px 36px rgba(201,169,110,0.3);
    }
    .float-query__icon { font-size: 1rem; }

    /* ── REVEAL ───────────────────────────────────────────── */
    .reveal { opacity: 0; transform: translateY(20px); transition: opacity 0.8s var(--ease-silk), transform 0.8s var(--ease-silk); }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* ── RESPONSIVE ───────────────────────────────────────── */
    @media (max-width: 700px) {
      .gallery-grid { columns: 2 160px; column-gap: 8px; }
      .gallery-grid .gitem { margin-bottom: 8px; }
      .lightbox__prev { left: 0.5rem; }
      .lightbox__next { right: 0.5rem; }
    }
    @media (max-width: 400px) {
      .gallery-grid { columns: 1; }
      .float-query { padding: 0.85rem 1.2rem; bottom: 1.2rem; right: 1.2rem; font-size: 0.7rem; }
    }
    @media (pointer: coarse) {
      body { cursor: auto; }
      .cursor-dot, .cursor-ring { display: none; }
      .filter-btn, .lightbox__close, .lightbox__prev, .lightbox__next, .float-query { cursor: pointer; }
    }
  </style>
</head>
<body>

  <canvas class="grain" id="grainCanvas" aria-hidden="true"></canvas>
  <div class="cursor-dot"  id="cursorDot"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <!-- NAV -->
  <nav class="nav" aria-label="Site navigation">
    <a href="index.html" class="nav__logo">Kaelith</a>
    <ul class="nav__links">
      <li><a href="index.html#work">Work</a></li>
      <li><a href="index.html#about">About</a></li>
      <li><a href="index.html#services">Services</a></li>
      <li><a href="index.html#pricing">Pricing</a></li>
      <li><a href="gallery.html" class="active">Gallery</a></li>
      <li><a href="query%20(1).html">Query</a></li>
      <li><a href="index.html#contact">Contact</a></li>
    </ul>
  </nav>

  <main class="page">

    <!-- HEADER -->
    <header class="ghero reveal">
      <span class="ghero__label">Visual Archive</span>
      <h1 class="ghero__title">The Full<br><em>Collection</em></h1>
    </header>

    <div class="hr-wrap"><hr/></div>

    <!-- FILTERS (built from gallery-config.js) -->
    <div class="filters reveal" id="filterBar" role="tablist" aria-label="Filter gallery by category"></div>

    <!-- COUNT -->
    <p class="gallery-count" id="galleryCount"></p>

    <!-- GRID (built from gallery-config.js) -->
    <div class="gallery-grid" id="galleryGrid"></div>

  </main>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
    <button class="lightbox__prev" id="lbPrev" aria-label="Previous image">‹</button>
    <img class="lightbox__img" id="lbImg" src="" alt="" />
    <button class="lightbox__next" id="lbNext" aria-label="Next image">›</button>
    <button class="lightbox__close" id="lbClose" aria-label="Close lightbox">✕</button>
    <p class="lightbox__caption" id="lbCaption"></p>
  </div>

  <!-- FLOATING QUERY -->
  <a href="query%20(1).html" class="float-query" aria-label="Send a query">
    <span class="float-query__icon">✉</span>
    <span class="float-query__text">Enquiry →</span>
  </a>

  <!-- FOOTER -->
  <footer class="footer" role="contentinfo">
    <p>© <span id="yr"></span> Kaelith. All rights reserved. &nbsp;·&nbsp; <a href="index.html">Back to portfolio</a></p>
  </footer>

  <!-- Load gallery config FIRST -->
  <script src="gallery-config.js"></script>

  <script>
    'use strict';

    // ── Year ──────────────────────────────────────────────────
    document.getElementById('yr').textContent = new Date().getFullYear();

    // ── State ─────────────────────────────────────────────────
    let activeCategory = 'all';
    let visibleImages  = [];   // tracks currently visible items for lightbox
    let lbIndex        = 0;

    // ── Build filter buttons ──────────────────────────────────
    const filterBar = document.getElementById('filterBar');
    galleryData.categories.forEach(cat => {
      const btn = document.createElement('button');
      btn.className   = 'filter-btn' + (cat.id === 'all' ? ' active' : '');
      btn.textContent = cat.label;
      btn.setAttribute('role', 'tab');
      btn.setAttribute('aria-selected', cat.id === 'all');
      btn.setAttribute('data-cat', cat.id);
      btn.addEventListener('click', () => setFilter(cat.id));
      filterBar.appendChild(btn);
    });

    // ── Build grid ────────────────────────────────────────────
    const grid = document.getElementById('galleryGrid');

    galleryData.images.forEach((img, i) => {
      const item = document.createElement('div');
      item.className = 'gitem active-item';
      item.setAttribute('data-cat', img.category);
      item.setAttribute('data-index', i);

      const image = document.createElement('img');
      image.src     = img.src;
      image.alt     = img.alt;
      image.loading = 'lazy';
      image.decoding = 'async';

      const overlay = document.createElement('div');
      overlay.className = 'gitem__overlay';
      const catLabel = document.createElement('span');
      catLabel.className = 'gitem__cat';
      // Find category label
      const catObj = galleryData.categories.find(c => c.id === img.category);
      catLabel.textContent = catObj ? catObj.label : img.category;
      overlay.appendChild(catLabel);

      item.appendChild(image);
      item.appendChild(overlay);
      grid.appendChild(item);

      // Click to open lightbox
      item.addEventListener('click', () => openLightbox(i));
    });

    // ── Stagger entrance ─────────────────────────────────────
    const items = document.querySelectorAll('.gitem');
    const entObs = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          const idx = parseInt(e.target.getAttribute('data-index') || '0', 10);
          setTimeout(() => e.target.classList.add('in'), (idx % 6) * 60);
          entObs.unobserve(e.target);
        }
      });
    }, { threshold: 0.05 });
    items.forEach(el => entObs.observe(el));

    // ── Filter logic ──────────────────────────────────────────
    function setFilter(catId) {
      activeCategory = catId;

      // Update button states
      document.querySelectorAll('.filter-btn').forEach(btn => {
        const isActive = btn.getAttribute('data-cat') === catId;
        btn.classList.toggle('active', isActive);
        btn.setAttribute('aria-selected', isActive);
      });

      // Update item states
      let count = 0;
      items.forEach(item => {
        const itemCat = item.getAttribute('data-cat');
        const match   = catId === 'all' || itemCat === catId;
        item.classList.toggle('dimmed', !match);
        item.classList.toggle('active-item', match);
        if (match) count++;
      });

      // Update count
      updateCount(count, catId);
    }

    function updateCount(count, catId) {
      const countEl = document.getElementById('galleryCount');
      const label   = catId === 'all' ? 'All images' : galleryData.categories.find(c => c.id === catId)?.label;
      countEl.textContent = `${count} ${label || ''} ${count === 1 ? 'image' : 'images'}`;
    }

    // Initial count
    updateCount(galleryData.images.length, 'all');

    // ── LIGHTBOX ──────────────────────────────────────────────
    const lightbox = document.getElementById('lightbox');
    const lbImg    = document.getElementById('lbImg');
    const lbCap    = document.getElementById('lbCaption');

    function getVisibleIndices() {
      // Returns indices of images matching current filter
      return galleryData.images
        .map((img, i) => ({ img, i }))
        .filter(({ img }) => activeCategory === 'all' || img.category === activeCategory)
        .map(({ i }) => i);
    }

    function openLightbox(globalIndex) {
      visibleImages = getVisibleIndices();
      lbIndex = visibleImages.indexOf(globalIndex);
      if (lbIndex === -1) lbIndex = 0;
      showLbImage();
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }

    function showLbImage() {
      const idx = visibleImages[lbIndex];
      const img = galleryData.images[idx];
      lbImg.src = img.src;
      lbImg.alt = img.alt;
      const catObj = galleryData.categories.find(c => c.id === img.category);
      lbCap.textContent = (catObj ? catObj.label : img.category);
    }

    document.getElementById('lbClose').addEventListener('click', closeLightbox);
    document.getElementById('lbPrev').addEventListener('click', () => {
      lbIndex = (lbIndex - 1 + visibleImages.length) % visibleImages.length;
      showLbImage();
    });
    document.getElementById('lbNext').addEventListener('click', () => {
      lbIndex = (lbIndex + 1) % visibleImages.length;
      showLbImage();
    });

    // Keyboard nav
    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape')      closeLightbox();
      if (e.key === 'ArrowLeft')  { lbIndex = (lbIndex - 1 + visibleImages.length) % visibleImages.length; showLbImage(); }
      if (e.key === 'ArrowRight') { lbIndex = (lbIndex + 1) % visibleImages.length; showLbImage(); }
    });

    // Click outside image to close
    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });

    // ── Scroll reveal ─────────────────────────────────────────
    const revObs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); revObs.unobserve(e.target); } });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => revObs.observe(el));

    // ── Custom cursor ─────────────────────────────────────────
    const dot  = document.getElementById('cursorDot');
    const ring = document.getElementById('cursorRing');
    let mx = 0, my = 0, rx = 0, ry = 0;
    document.addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY;
      dot.style.left = mx + 'px'; dot.style.top = my + 'px';
    });
    (function animRing() {
      rx += (mx - rx) * 0.14; ry += (my - ry) * 0.14;
      ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
      requestAnimationFrame(animRing);
    })();
    document.querySelectorAll('a, button, .gitem').forEach(el => {
      el.addEventListener('mouseenter', () => document.body.classList.add('cursor-hover'));
      el.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hover'));
    });

    // ── Film grain ────────────────────────────────────────────
    const canvas = document.getElementById('grainCanvas');
    const ctx    = canvas.getContext('2d');
    function resizeGrain() { canvas.width = window.innerWidth * 0.5; canvas.height = window.innerHeight * 0.5; }
    resizeGrain();
    window.addEventListener('resize', resizeGrain, { passive: true });
    (function renderGrain() {
      const w = canvas.width, h = canvas.height;
      const id = ctx.createImageData(w, h);
      const b  = id.data;
      for (let i = 0; i < b.length; i += 4) {
        const v = (Math.random() * 255) | 0;
        b[i] = b[i+1] = b[i+2] = v; b[i+3] = 255;
      }
      ctx.putImageData(id, 0, 0);
      requestAnimationFrame(renderGrain);
    })();
  </script>

</body>
</html>
